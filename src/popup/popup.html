<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Grabber</title>
  </head>
  <body>
    <div class="app" id="app">
      <header class="header">
        <div class="brand">
          <span class="brand__logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v12" />
              <path d="m7 12 5 5 5-5" />
              <path d="M5 21h14" />
            </svg>
          </span>
          <div class="brand__text">
            <strong>PDF Grabber</strong>
            <span class="brand__sub" id="statusLine">Buscando PDF…</span>
          </div>
        </div>
        <div class="header__actions">
          <button class="icon-btn" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
          <button class="icon-btn" id="openOptions" title="Ajustes" aria-label="Ajustes">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <main class="main">
        <ul class="sources" id="sourcesList" hidden></ul>

        <section class="empty" id="emptyState">
          <div class="empty__spinner" id="spinner"></div>
          <p class="empty__title" id="emptyTitle">Analizando la pestaña…</p>
          <p class="empty__hint" id="emptyHint">Detectando PDFs incrustados, en blob, fetch/XHR o en el visor.</p>
          <button class="btn btn--ghost" id="rescan" hidden>Volver a analizar</button>
        </section>
      </main>

      <section class="diag" id="diagPanel" hidden>
        <button class="diag__toggle" id="diagToggle" aria-expanded="false">
          <span>Panel de diagnóstico</span>
          <svg class="diag__chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="diag__body" id="diagBody" hidden></div>
      </section>

      <footer class="footer">
        <span id="versionLabel"></span>
        <a href="#" id="footerOptions">Ajustes avanzados</a>
      </footer>
    </div>

    <template id="sourceTemplate">
      <li class="source">
        <div class="source__head">
          <span class="badge" data-role="badge"></span>
          <span class="source__meta" data-role="meta"></span>
        </div>
        <div class="source__name" data-role="name" title=""></div>
        <div class="source__url" data-role="url" title=""></div>
        <div class="source__actions">
          <button class="btn btn--primary" data-action="download">
            <span data-role="dl-label">Descargar</span>
          </button>
          <button class="btn" data-action="copy" title="Copiar URL">Copiar URL</button>
          <button class="btn" data-action="open" title="Abrir en nueva pestaña">Abrir</button>
        </div>
        <div class="source__result" data-role="result" hidden></div>
      </li>
    </template>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
